description: >-
  The United States Botanic Garden (USBG) is a living museum in Washington, D.C.
  that showcases a diverse collection of plants from around the world. Established
  by the U.S. Congress in 1820, the Botanic Garden serves as a resource for
  education and inspiration, promoting an understanding and appreciation of plants
  and their importance to the environment and human well-being. The Garden
  maintains more than 9,500 accessions representing approximately 44,000 plants,
  managed through its Living Collections database (BG-BASE). The USBG is
  administered by the Architect of the Capitol and is located adjacent to the
  U.S. Capitol on the National Mall.
