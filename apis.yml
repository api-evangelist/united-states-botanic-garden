description: >-
  The United States Botanic Garden is a living museum in Washington, D.C. that showcases
  a diverse collection of plants from around the world. Established by the U.S. Congress
  in 1820, the Botanic Garden serves as a resource for education and inspiration,
  promoting an understanding and appreciation of plants and their importance to the
  environment and human well-being. The Garden features a variety of exhibits, including
  themed displays, rare and endangered species, and seasonal showcases.
